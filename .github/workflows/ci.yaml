name: CI
on:
  pull_request:
    branches: [ "*" ]

permissions:
  contents: read

jobs:
  steps:
    - uses: pnpm/action-setup@v4.2.0
      with:
        version: latest

    - uses: actions/setup-node@v6
      with:
        node-version: 25
        cache-dependency-path: ./pnpm-lock.yaml

    - shell: bash
      run: pnpm install --frozen-lockfile

    - shell: bash
      run: pnpm build
